<!-- MODO ALEATORIO -->
<div *ngIf="modoAleatorio">
  <br>
  <div class="row">
    <div class="col-12" style="text-align: right">
      <button style="display: inline-block;" type="button" class="btn btn-tn btn-primary"
        title="Refrescar"
        (click)="refrescarModoAleatorio()">
        <i class="fa fa-refresh"></i>
      </button>
    </div>
  </div>

  <br>

  <div class="form-row mb-3" *ngIf="userRole === 1">
    <div class="col-md-4 offset-md-3 col-sm-12 form-group">
      <label class="form-control-label" for="userIdSel">Filtrar por Vendedor:</label>
      <select
        class="form-control" id="userIdSel" 
        [(ngModel)]="userIdSel" 
        (change)="onEmpleadoChange($event.target.value)">
        <option value="1">Mis Publicaciones (Admin)</option>
        <option *ngFor="let emp of empleados" [value]="emp.id">
          {{ emp.nombre }}
        </option>
      </select>
    </div>
    <div class="col-md-2 col-sm-12 form-group d-flex align-items-end">
        <button 
        class="btn btn-info btn-block btn-tn" 
        (click)="limpiar()">
        Limpiar
        </button>
    </div>
  </div>

  <div *ngIf="publicacionActual">

    <div class="row">
      <div class="col-12">
        <strong>Proveedor:</strong> {{ publicacionActual?.supplier?.razon_social }}
      </div>
    </div>
    <br>
    <div class="row">
      <div class="col-12">
        <strong>Texto:</strong>
        <p style="white-space: pre-line;">{{ publicacionActual?.texto }}</p>
      </div>
    </div>
    <br>
    <div class="row">
      <div *ngFor="let img of publicacionActual?.images" class="col-6 col-md-2"
        style="margin-bottom: 10px;">
        <img [src]="img.url" style="width: 100%; border-radius: 4px;">
      </div>
    </div>
    <br>
    <div class="row">
      <div class="col-12" style="text-align: right;">
        <button type="button" class="btn btn-tn btn-danger"
          title="Eliminar"
          (click)="abrirModalEliminar(publicacionActual, modalEliminar)"
          style="margin-top: 10px;">
          <i class="fa fa-trash"></i>
        </button>
        <button type="button" class="btn btn-tn btn-secondary"
          style="margin-left: 8px; margin-top: 10px;"
          (click)="siguienteAleatoria()">
          <i class="fa fa-forward"></i> Siguiente
        </button>
        <button type="button" class="btn btn-tn btn-success"
          style="margin-left: 8px; margin-top: 10px;"
          [disabled]="compartiendo || (userRole === 1 && userIdSel !== '1')"
          (click)="publicarAleatoria()">
          <i class="fa fa-whatsapp"></i>
          {{ compartiendo ? 'Compartiendo...' : 'Publicar en WhatsApp' }}
        </button>
      </div>
    </div>

  </div>
</div>

<!-- MODAL ELIMINAR -->
<ng-template #modalEliminar let-c="close" let-d="dismiss">
  <div class="modal-header">
    <h4 class="modal-title">Eliminar publicación</h4>
    <button type="button" class="close" (click)="d('Cross click')">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>
  <div class="modal-body" *ngIf="modalEliminarVisible">
    <p>¿Estás seguro que deseas eliminar esta publicación?</p>
    <p style="color: #888; font-size: 0.9em;">Esta acción no se puede deshacer.</p>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-tn btn-secondary"
      (click)="c('Close click'); cerrarModalEliminar()">
      Cancelar
    </button>
    <button type="button" class="btn btn-tn btn-danger"
      (click)="confirmarEliminar()">
      Eliminar
    </button>
  </div>
</ng-template>

<toaster-container [toasterconfig]="config"></toaster-container>

<div class="my-container">
  <ngx-loading [show]="loading" [config]="{ backdropBorderRadius: '4px' }"></ngx-loading>
</div>
