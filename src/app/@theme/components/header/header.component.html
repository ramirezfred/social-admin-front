

<div class="header-container"
     [class.left]="position === 'normal'"
     [class.right]="position === 'inverse'">
  <div class="logo-containter">
    <a (click)="toggleSidebar()" href="#" class="navigation"><i class="nb-menu"></i></a>
    <!-- <div class="logo" (click)="salir()"><span><img src="assets/images/thumbnail_goopy.png" alt="" height="50px" width="auto" style="display:block; margin:auto"/></span></div> -->
    <div class="logo" (click)="salir()"><span><img src="assets/images/LogoInterNow.png" alt="" height="50px" width="auto" style="display:block; margin:auto"/></span></div>
  </div>

</div>

<toaster-container [toasterconfig]="config"></toaster-container>

<nb-actions
  size="medium"
  class="header-container"
  [class.right]="position === 'normal'"
  [class.left]="position === 'inverse'">

  <nb-action>
    <nb-user [menu]="userMenu" [name]="user?.name" [picture]="user?.picture" (menuClick)="onMenuClick($event)"></nb-user>
  </nb-action>

  </nb-action-->

</nb-actions>
